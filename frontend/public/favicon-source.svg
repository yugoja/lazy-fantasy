  <!-- Left eye -->
  <path d="M 11.5 16.5 Q 13 15 14.5 16.5" stroke="#22C373" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Right eye -->
  <path d="M 17.5 16.5 Q 19 15 20.5 16.5" stroke="#22C373" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="16" cy="19.5" rx="2.8" ry="2.2" fill="#22C373"/>
  <!-- Smile -->
