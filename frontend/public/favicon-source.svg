<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#22C373"/>
  <!-- Left ear outer -->
  <circle cx="5.5" cy="12" r="5" fill="white"/>
  <!-- Left ear inner -->
  <circle cx="5.5" cy="12.5" r="3" fill="#22C373"/>
  <!-- Right ear outer -->
  <circle cx="26.5" cy="12" r="5" fill="white"/>
  <!-- Right ear inner -->
  <circle cx="26.5" cy="12.5" r="3" fill="#22C373"/>
  <!-- Head -->
