services:
  postgres:
    image: postgres:16
    container_name: lazyfantasy-db
    environment:
      POSTGRES_DB: lazyfantasy_dev
      POSTGRES_USER: lazyfantasy
      POSTGRES_PASSWORD: lazyfantasy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lazyfantasy -d lazyfantasy_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
