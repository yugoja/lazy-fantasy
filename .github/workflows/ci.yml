name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lazyfantasy_test
          POSTGRES_USER: lazyfantasy
          POSTGRES_PASSWORD: lazyfantasy
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://lazyfantasy:lazyfantasy@localhost:5432/lazyfantasy_test
        run: alembic upgrade head

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://lazyfantasy:lazyfantasy@localhost:5432/lazyfantasy_test
          SECRET_KEY: ci-test-secret-key-not-used-in-prod
        run: pytest --tb=short -q

  frontend:
    name: Frontend — lint · typecheck · test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

      - name: Test
        working-directory: frontend
        run: npm run test:run
