# Lazy Fantasy — Nginx configuration
# Production (port 80) + Staging (port 8080)
#
# Install: cp infra/nginx.conf /etc/nginx/sites-available/lazy-fantasy
#          ln -sf /etc/nginx/sites-available/lazy-fantasy /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx

# ─── Production (port 80) ────────────────────────────────────────────────────
server {
    listen 80;
    server_name 139.59.3.190;

    # Backend API — direct routes
    location ~ ^/(auth|matches|leagues|predictions|admin|health|notifications|f1|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend — everything else
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Staging (port 8080) ─────────────────────────────────────────────────────
server {
    listen 8080;
    server_name 139.59.3.190;

    # Backend API — direct routes
    location ~ ^/(auth|matches|leagues|predictions|admin|health|notifications|f1|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend — everything else
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
