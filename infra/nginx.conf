# Lazy Fantasy — Nginx configuration
# Production (ports 80/443) + Staging (port 8080)

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name lazyfantasy.app www.lazyfantasy.app yugoja.com www.yugoja.com;
    return 301 https://$host$request_uri;
}

# ─── Production HTTPS — lazyfantasy.app ──────────────────────────────────────
server {
    listen 443 ssl;
    server_name lazyfantasy.app www.lazyfantasy.app;

    ssl_certificate /etc/letsencrypt/live/lazyfantasy.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lazyfantasy.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ~ ^/(auth|matches|leagues|predictions|admin|health|notifications|f1|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Production HTTPS — yugoja.com ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name yugoja.com www.yugoja.com;

    ssl_certificate /etc/letsencrypt/live/yugoja.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yugoja.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ~ ^/(auth|matches|leagues|predictions|admin|health|notifications|f1|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Staging (port 8080) ─────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    location ~ ^/(auth|matches|leagues|predictions|admin|health|notifications|f1|docs|openapi\.json) {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
