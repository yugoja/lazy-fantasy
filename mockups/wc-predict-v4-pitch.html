<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>V4 · Stadium Pitch — ESP vs FRA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Inter:wght@400;500;600;700&display=swap">
<style>
:root {
  --bg: oklch(15% 0.018 145);
  --pitch-1: oklch(38% 0.16 145);
  --pitch-2: oklch(34% 0.14 145);
  --pitch-line: oklch(86% 0.04 145 / 0.5);
  --ink: oklch(96% 0.005 145);
  --ink-dim: oklch(72% 0.02 145);
  --ink-mute: oklch(54% 0.025 145);
  --hl: oklch(86% 0.20 88);
  --hl-deep: oklch(70% 0.18 88);
  --esp: oklch(60% 0.22 28);
  --esp-dark: oklch(38% 0.18 28);
  --fra: oklch(48% 0.18 258);
  --fra-dark: oklch(28% 0.14 258);
  --green: oklch(68% 0.20 145);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: oklch(10% 0.014 145);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  min-height: 100svh;
  display: grid; place-items: center;
  padding: 24px;
}
.app {
  width: 100%; max-width: 430px; height: 920px;
  background: var(--bg);
  position: relative; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: 0 30px 90px rgba(0,0,0,0.75);
  border-radius: 28px;
}

/* stadium top bar */
.stadium-bar {
  flex-shrink: 0;
  padding: 14px 22px 14px;
  background:
    repeating-linear-gradient(90deg, oklch(20% 0.018 145) 0 6px, oklch(13% 0.014 145) 6px 12px);
  border-bottom: 1px solid oklch(28% 0.022 145);
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-dim);
}
.stadium-bar .lhs { color: var(--hl); }
.stadium-bar .rhs { display: inline-flex; align-items: center; gap: 7px; }
.stadium-bar .rhs::before {
  content:''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--hl);
  animation: blip 1.5s infinite;
}
@keyframes blip { 0%,100% { opacity:.4;} 50% { opacity:1;} }

/* scoreboard */
.scoreboard {
  flex-shrink: 0;
  padding: 14px 22px 14px;
  background: oklch(13% 0.014 145);
  border-bottom: 1px solid oklch(28% 0.022 145);
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  gap: 12px;
  position: relative;
}
.scoreboard::before {
  content:''; position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 1px;
  background: oklch(28% 0.022 145);
  z-index: 0;
}
.sb-side {
  display: flex; align-items: center; gap: 10px;
}
.sb-side.right { justify-content: flex-end; }
.sb-crest {
  width: 32px; height: 32px;
  display: grid; place-items: center;
  font-family: 'Space Grotesk'; font-weight: 700; font-size: 10px;
  letter-spacing: 0.08em;
}
.sb-crest.esp { background: linear-gradient(180deg, oklch(60% 0.25 28), #fff, oklch(60% 0.25 28)); color: #0a0a0a; }
.sb-crest.fra { background: linear-gradient(90deg, oklch(38% 0.18 258) 0 33%, #fff 33% 66%, oklch(58% 0.22 28) 66%); color: #0a0a0a; }
.sb-team {
  font-family: 'JetBrains Mono'; font-weight: 700;
  font-size: 14px; letter-spacing: 0.04em;
  color: var(--ink);
}
.sb-pop {
  font-family: 'JetBrains Mono'; font-size: 9.5px; font-weight: 500;
  color: var(--ink-mute); margin-top: 2px;
  letter-spacing: 0.08em;
}
.sb-center {
  display: flex; align-items: center; gap: 10px;
  z-index: 1;
}
.sb-score {
  font-family: 'JetBrains Mono'; font-weight: 700;
  font-size: 56px; line-height: 1; letter-spacing: -0.04em;
  color: var(--ink);
  cursor: pointer; user-select: none;
  font-variant-numeric: tabular-nums;
  min-width: 36px; text-align: center;
}
.sb-score.bump { animation: bump 0.28s ease-out; }
@keyframes bump { 0%{transform:scale(1)} 45%{transform:scale(1.12)} 100%{transform:scale(1)} }
.sb-score-divider {
  font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 500;
  color: var(--ink-mute); letter-spacing: -0.04em;
  margin-top: -8px;
}
.sb-stepper {
  display: flex; flex-direction: column; gap: 2px;
}
.sb-stepper button {
  width: 22px; height: 18px;
  background: oklch(20% 0.018 145);
  border: 1px solid oklch(30% 0.022 145);
  color: var(--ink-dim);
  font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700;
  cursor: pointer;
}
.sb-stepper button:active { background: var(--hl); color: oklch(15% 0.018 60); }

/* pitch */
.pitch-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--pitch-1);
  background-image:
    repeating-linear-gradient(90deg,
      var(--pitch-1) 0 14.28%,
      var(--pitch-2) 14.28% 28.56%);
}
.pitch-lines {
  position: absolute; inset: 12px;
  border: 2px solid var(--pitch-line);
  pointer-events: none;
}
.pitch-lines::before,
.pitch-lines::after {
  content:''; position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 28%; height: 60%;
  border: 2px solid var(--pitch-line);
}
.pitch-lines::before { left: 0; border-left: none; }
.pitch-lines::after { right: 0; border-right: none; }
.pitch-circle {
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 80px; height: 80px;
  border: 2px solid var(--pitch-line);
  border-radius: 50%;
  pointer-events: none;
}
.pitch-circle::after {
  content:''; position: absolute; left: 50%; top: 50%;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--pitch-line);
  transform: translate(-50%, -50%);
}
.pitch-midline {
  position: absolute; left: 50%; top: 12px; bottom: 12px;
  width: 2px; background: var(--pitch-line);
  pointer-events: none;
}

/* player dot */
.player {
  position: absolute;
  width: 38px; height: 38px;
  transform: translate(-50%, -50%);
  cursor: pointer;
  z-index: 3;
}
.player .jersey {
  width: 100%; height: 100%;
  border-radius: 50%;
  display: grid; place-items: center;
  font-family: 'JetBrains Mono'; font-weight: 700; font-size: 11px;
  color: var(--ink);
  border: 2px solid oklch(95% 0 0 / 0.85);
  position: relative;
  transition: transform 0.18s ease-out, box-shadow 0.18s;
}
.player.esp .jersey { background: var(--esp); }
.player.fra .jersey { background: var(--fra); }
.player .label {
  position: absolute;
  top: 100%; left: 50%; transform: translateX(-50%);
  margin-top: 4px;
  font-family: 'Space Grotesk'; font-weight: 700; font-size: 9.5px;
  letter-spacing: 0.04em; color: var(--ink);
  background: oklch(15% 0.018 145 / 0.85);
  padding: 2px 6px;
  white-space: nowrap;
  border-radius: 3px;
  pointer-events: none;
}
.player.selected .jersey {
  background: var(--hl);
  color: oklch(15% 0.018 60);
  border-color: var(--hl);
  box-shadow:
    0 0 0 3px oklch(15% 0.018 145),
    0 0 0 5px var(--hl),
    0 0 30px oklch(86% 0.20 88 / 0.6);
  transform: scale(1.15);
}
.player.selected .label {
  background: var(--hl); color: oklch(15% 0.018 60);
}
.player.selected::after {
  content: '★';
  position: absolute;
  top: -6px; right: -6px;
  width: 18px; height: 18px;
  background: oklch(15% 0.018 145);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 11px; color: var(--hl);
  z-index: 4;
}
.player.dim { opacity: 0.5; pointer-events: none; }
.player:not(.selected):hover .jersey {
  transform: scale(1.1);
  box-shadow: 0 4px 14px oklch(0% 0 0 / 0.5);
}

/* form/tag flag on key players */
.player .flame {
  position: absolute; top: -8px; left: -2px;
  font-size: 12px;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
  z-index: 5;
}

/* pitch overlay HUD */
.pitch-hud {
  position: absolute;
  top: 12px; left: 12px;
  display: flex; flex-direction: column; gap: 6px;
  z-index: 5;
}
.hud-pill {
  font-family: 'JetBrains Mono'; font-size: 9px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  background: oklch(15% 0.018 145 / 0.78);
  color: var(--ink);
  padding: 4px 8px;
  border: 1px solid oklch(28% 0.022 145);
}
.hud-pill b { color: var(--hl); }

/* winner picker — bottom strip */
.winner-strip {
  flex-shrink: 0;
  padding: 10px 16px;
  background: oklch(13% 0.014 145);
  border-top: 1px solid oklch(28% 0.022 145);
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px;
}
.win-btn {
  position: relative;
  padding: 11px 8px;
  background: oklch(18% 0.018 145);
  border: 1px solid oklch(28% 0.022 145);
  color: var(--ink-dim);
  font-family: 'Space Grotesk'; font-weight: 700; font-size: 11.5px;
  letter-spacing: 0.06em;
  cursor: pointer;
  text-align: center;
  transition: 0.18s;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.win-btn .lab {
  font-family: 'JetBrains Mono'; font-size: 9px; font-weight: 700;
  letter-spacing: 0.2em; color: var(--ink-mute);
}
.win-btn .nm {
  font-family: 'Space Grotesk'; font-weight: 700; font-size: 13.5px;
  letter-spacing: 0;
  color: var(--ink);
}
.win-btn[data-w="esp"] { border-color: var(--esp-dark); }
.win-btn[data-w="fra"] { border-color: var(--fra-dark); }
.win-btn:hover { background: oklch(22% 0.022 145); }
.win-btn.selected {
  background: oklch(28% 0.022 145);
  border-color: var(--hl);
  color: var(--hl);
  box-shadow: 0 0 0 2px oklch(86% 0.20 88 / 0.18);
}
.win-btn.selected .nm { color: var(--hl); }
.win-btn.selected .lab { color: var(--hl-deep); }
.win-btn.selected::after {
  content: '✓';
  position: absolute; top: 4px; right: 6px;
  font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 700;
  color: var(--hl);
}

/* dock / lock */
.dock {
  flex-shrink: 0;
  padding: 12px 18px 18px;
  background: oklch(11% 0.014 145);
  border-top: 1px solid oklch(28% 0.022 145);
  display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
}
.dock .pts {
  font-family: 'JetBrains Mono'; font-weight: 700;
  font-size: 28px; line-height: 1;
  color: var(--hl);
  font-variant-numeric: tabular-nums;
}
.dock .pts small {
  font-size: 10px; font-weight: 700; letter-spacing: 0.22em;
  color: var(--ink-mute); margin-left: 4px; text-transform: uppercase;
}
.dock .meter {
  height: 6px;
  background: oklch(20% 0.018 145);
  border: 1px solid oklch(26% 0.022 145);
  position: relative;
  overflow: hidden;
}
.dock .meter .fill {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: linear-gradient(90deg, var(--green), var(--hl));
  width: 0;
  transition: width 0.4s cubic-bezier(0.2,0.85,0.2,1);
}
.dock .meter .ticks {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(90deg, transparent 0 19%, oklch(0% 0 0 / 0.5) 19% 20%);
}
.dock .meter .label {
  position: absolute; left: 0; right: 0; top: -16px;
  display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono'; font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.16em; color: var(--ink-mute);
}
.lock-btn {
  height: 50px; padding: 0 22px;
  background: var(--hl); color: oklch(15% 0.018 60);
  border: none; cursor: pointer;
  font-family: 'JetBrains Mono'; font-size: 12.5px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 10px;
  clip-path: polygon(0 0, 100% 0, calc(100% - 12px) 100%, 0 100%);
  padding-right: 30px;
}
.lock-btn:disabled { background: oklch(22% 0.018 145); color: var(--ink-mute); cursor: not-allowed; }
.lock-btn:not(:disabled):hover { background: oklch(92% 0.22 88); }
</style>
</head>
<body>

<div class="app">

  <div class="stadium-bar">
    <span class="lhs">▸ MATCHDAY 02 · GROUP D</span>
    <span class="rhs">LOCKS 04:22:18</span>
  </div>

  <div class="scoreboard">
    <div class="sb-side">
      <div class="sb-crest esp">ESP</div>
      <div>
        <div class="sb-team">SPAIN</div>
        <div class="sb-pop">WIN · 52%</div>
      </div>
    </div>
    <div class="sb-center">
      <div class="sb-stepper">
        <button data-s="a" data-d="1">+</button>
        <button data-s="a" data-d="-1">−</button>
      </div>
      <div class="sb-score" id="sA">2</div>
      <div class="sb-score-divider">·</div>
      <div class="sb-score" id="sB">1</div>
      <div class="sb-stepper">
        <button data-s="b" data-d="1">+</button>
        <button data-s="b" data-d="-1">−</button>
      </div>
    </div>
    <div class="sb-side right">
      <div>
        <div class="sb-team">FRANCE</div>
        <div class="sb-pop">WIN · 34%</div>
      </div>
      <div class="sb-crest fra">FRA</div>
    </div>
  </div>

  <div class="pitch-wrap" id="pitch">
    <div class="pitch-lines"></div>
    <div class="pitch-midline"></div>
    <div class="pitch-circle"></div>

    <div class="pitch-hud">
      <div class="hud-pill">TAP <b>3</b> TO HIGHLIGHT</div>
      <div class="hud-pill"><b id="picksN">0</b> / 3 SELECTED · <b>+10 EA</b></div>
    </div>

    <!-- ESP players (left half) - 4-3-3 -->
    <div class="player esp" data-id="esp-1" style="left:14%; top:24%"><div class="jersey">10</div><div class="label">Yamal</div><span class="flame">🔥</span></div>
    <div class="player esp" data-id="esp-2" style="left:14%; top:50%"><div class="jersey">9</div><div class="label">Morata</div></div>
    <div class="player esp" data-id="esp-3" style="left:14%; top:76%"><div class="jersey">17</div><div class="label">N. Williams</div></div>
    <div class="player esp" data-id="esp-4" style="left:28%; top:35%"><div class="jersey">8</div><div class="label">Pedri</div></div>
    <div class="player esp" data-id="esp-5" style="left:28%; top:65%"><div class="jersey">16</div><div class="label">Rodri</div><span class="flame">★</span></div>

    <!-- FRA players (right half) - 4-3-3 -->
    <div class="player fra" data-id="fra-1" style="left:72%; top:35%"><div class="jersey">14</div><div class="label">Tchouaméni</div></div>
    <div class="player fra" data-id="fra-2" style="left:72%; top:65%"><div class="jersey">8</div><div class="label">Doué</div></div>
    <div class="player fra" data-id="fra-3" style="left:86%; top:24%"><div class="jersey">11</div><div class="label">Dembélé</div><span class="flame">🔥</span></div>
    <div class="player fra" data-id="fra-4" style="left:86%; top:50%"><div class="jersey">10</div><div class="label">Mbappé</div><span class="flame">🔥</span></div>
    <div class="player fra" data-id="fra-5" style="left:86%; top:76%"><div class="jersey">29</div><div class="label">Barcola</div></div>
  </div>

  <div class="winner-strip">
    <button class="win-btn" data-w="esp">
      <span class="lab">+5 PTS</span>
      <span class="nm">Spain wins</span>
    </button>
    <button class="win-btn" data-w="draw">
      <span class="lab">+5 · 14% PICKED</span>
      <span class="nm">Draw</span>
    </button>
    <button class="win-btn" data-w="fra">
      <span class="lab">+5 PTS</span>
      <span class="nm">France wins</span>
    </button>
  </div>

  <div class="dock">
    <div class="pts"><span id="ptsN">5</span><small>PTS</small></div>
    <div class="meter">
      <div class="label"><span>0</span><span>50 MAX</span></div>
      <div class="fill" id="fill"></div>
      <div class="ticks"></div>
    </div>
    <button class="lock-btn" id="lockBtn" disabled>Lock</button>
  </div>

</div>

<script>
const state = { w: 'esp', score: {a:2, b:1}, picks: [] };
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

// players
document.querySelectorAll('.player').forEach(p => p.addEventListener('click', () => {
  const id = p.dataset.id;
  const idx = state.picks.indexOf(id);
  if (idx >= 0) { state.picks.splice(idx, 1); p.classList.remove('selected'); }
  else {
    if (state.picks.length >= 3) return;
    state.picks.push(id); p.classList.add('selected');
  }
  // dim unpicked when at 3
  document.querySelectorAll('.player').forEach(pp => {
    if (state.picks.length >= 3 && !pp.classList.contains('selected')) pp.classList.add('dim');
    else pp.classList.remove('dim');
  });
  $('#picksN').textContent = state.picks.length;
  recalc();
}));

// winner
document.querySelectorAll('.win-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.win-btn').forEach(x => x.classList.remove('selected'));
  b.classList.add('selected');
  state.w = b.dataset.w;
  recalc();
}));

// score
function bump(s) {
  const el = s === 'a' ? $('#sA') : $('#sB');
  el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
}
$$('.sb-stepper button').forEach(b => b.addEventListener('click', () => {
  const s = b.dataset.s, d = +b.dataset.d;
  const n = Math.max(0, Math.min(9, state.score[s] + d));
  if (n === state.score[s]) return;
  state.score[s] = n;
  $(s==='a'?'#sA':'#sB').textContent = n;
  bump(s); recalc();
}));
$$('.sb-score').forEach(el => el.addEventListener('click', () => {
  const s = el.id === 'sA' ? 'a' : 'b';
  state.score[s] = (state.score[s] + 1) % 10;
  el.textContent = state.score[s];
  bump(s); recalc();
}));

function recalc() {
  let pts = (state.w ? 5 : 0) + state.picks.length * 10;
  if (state.w === 'esp' && state.score.a > state.score.b) pts += 15;
  if (state.w === 'fra' && state.score.b > state.score.a) pts += 15;
  if (state.w === 'draw' && state.score.a === state.score.b) pts += 15;
  $('#ptsN').textContent = pts;
  $('#fill').style.width = `${Math.min(100, pts / 50 * 100)}%`;
  $('#lockBtn').disabled = !(state.w && state.picks.length === 3);
}

// init
document.querySelector('.win-btn[data-w="esp"]').classList.add('selected');
recalc();
</script>
</body>
</html>
